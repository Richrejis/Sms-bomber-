<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Bomber - Authorized Pentest Tool</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .splash {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0a1a 0%, #14142e 50%, #1a1a3e 100%);
            text-align: center;
            padding: 20px;
        }

        .splash-content {
            max-width: 500px;
        }

        .splash-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
        }

        .splash h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #e0e0e0;
            margin-bottom: 8px;
        }

        .splash .subtitle {
            color: #8b8ba0;
            font-size: 1rem;
            margin-bottom: 30px;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(90, 90, 239, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .splash .redirect-text {
            color: #666;
            font-size: 0.85rem;
            margin-top: 20px;
        }

        .splash a {
            color: var(--accent);
            text-decoration: none;
        }

        .splash a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="splash">
        <div class="splash-content">
            <span class="splash-icon">📱</span>
            <h1>Phone Bomber</h1>
            <p class="subtitle">Authorized Penetration Testing Tool</p>
            
            <div class="spinner"></div>
            <p>Redirecting to login...</p>

            <div class="redirect-text">
                <p>Not redirected automatically?</p>
                <a href="{{ url_for('login') }}">Click here to login</a>
            </div>
        </div>
    </div>

    <script>
        setTimeout(() => {
            window.location.href = "{{ url_for('login') }}";
        }, 1500);
    </script>
</body>
</html>
